<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 180px; 
      padding: 15px; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      text-align: center;
      background-color: #ffffff;
      margin: 0;
    }

    button { 
      width: 100%; 
      cursor: pointer; 
      padding: 10px; 
      background: #4285f4; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s, transform 0.1s;
      outline: none;
    }

    button:hover { 
      background: #357ae8; 
    }

    button:active {
      transform: scale(0.98);
    }
    
    /* Success Animation Styles */
    #status {
      margin-top: 12px;
      height: 18px; /* Prevents layout jump when text appears */
      font-size: 0.85em;
      color: #0f9d58;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-5px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    #status.show {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      margin-top: 15px;
      font-size: 10px;
      color: #9aa0a6;
      border-top: 1px solid #f1f3f4;
      padding-top: 10px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <button id="extractBtn">Copy Formatted Text</button>
  
  <div id="status"></div>

  <div class="footer">maintained by <b>su77ungr</b></div>

  <script src="popup.js"></script>
</body>
</html>
